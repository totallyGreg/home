# vim: foldmethod=marker
# Hierarchy:
#  Server
#  ㄴSession
#    ㄴWindow
#      ㄴPane
#
# Options:
# - Session options (set-option [-g])
# - Window options (set-window-option [-g])

# {{{ SERVER
# ____ ____ ____ _  _ ____ ____
# [__  |___ |__/ |  | |___ |__/
# ___] |___ |  \  \/  |___ |  \

## Terminal capability
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-ghostty:RGB:mouse:usstyle:clipboard:title:extkeys"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'   # disable alternate screen so scrollback persists across full-screen apps

## Pass-through and extended keys (Claude Recommendations)
set -g allow-passthrough on    # lets notifications and progress updates reach iTerm2, Ghostty
set -s extended-keys on        # let tmux distinguish Shift+Enter from plain Enter so the newline shortcut works.

## Focus and mouse
set -g focus-events on
set-option -g mouse on

## History and titles
set-option -g history-limit 50000
set -g set-titles on
set -g set-titles-string '#(whoami)@#h:#{pane_current_path}'
# set -g set-titles-string '\e]7;#(whoami)@#h:#{pane_current_path}'

## Activity monitoring
set-window-option -g monitor-activity on
set -g visual-activity on

## Status bar position (native — powerkit also sets this, kept for early-load visual consistency)
set -g status-position top
# set -g status-style "none,bg=colour0"
# set-option -g @dark_appearance 0  # unified terminal theme switching: https://github.com/alberti42/zsh-appearance-control

# }}}

# {{{ PREFIX & BASICS
# ___  ____ ____ ____ _ _  _    ____ _  _ ___     ___  ____ ____ _ ____ ____
# |__] |__/ |___ |___ |  \/     |__| |\ | |  \    |__] |__| [__  | |    [__
# |    |  \ |___ |    | _/\_    |  | | \| |__/    |__] |  | ___] | |___ ___]

## Prefix: use C-a (legacy screen muscle memory; easier reach than C-b)
unbind-key C-b
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix            # allow C-a, C-a to pass through (e.g. so vim can increment)

## Session lifecycle
set-option -g detach-on-destroy off # don't exit from tmux when closing a session

## Window/pane numbering
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

## Repeat timing
# 250ms — half the tmux default 500ms. Balances snappy prefix-mode exit with
# usable repeat on the M-h/j/k/l vim-aware resize bindings (the only -r binds today).
# Previous value 50ms was effectively no-repeat (faster than humanly chordable);
# pain-control plugin that motivated that tight value is now disabled.
set-option -g repeat-time 250

## Copy mode keys
set -g mode-keys vi

## Selection highlight style
set-window-option -g mode-style 'fg=white,bg=brightgreen'

# }}}

# {{{ PLUGINS
# ___  _    _  _ ____ _ _  _ ____
# |__] |    |  | | __ | |\ | [__
# |    |___ |__| |__] | | \| ___]

## TPM scaffold
setenv -g TMUX_PLUGIN_MANAGER_PATH "$XDG_CONFIG_HOME/tmux/plugins/"
if "test ! -d $XDG_CONFIG_HOME/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/tmux/plugins/tpm && \
      $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'

# {{{ powerkit
set -g @plugin 'fabioluciano/tmux-powerkit'    # PowerKit plugin for statusbar
# set -g @plugin 'totallyGreg/tmux-powerkit#feature/macos-appearance-plugin' # my fork until appearance PR merges

# {{{ powerkit options reference (folded by default)
# ──────────────────────────────────────────────────────────────────────────────
# Reference snapshot from powerkit src/core/defaults.sh @ 2026-06-17
# Regenerate when powerkit updates — see ~/.config/tmux/plugins/tmux-powerkit/src/core/defaults.sh
# ──────────────────────────────────────────────────────────────────────────────
#
# ──── Theme ────
# @powerkit_theme                            default: catppuccin                       # atom|ayu|catppuccin|cobalt2|darcula|dracula|everforest|flexoki|github|gruvbox|horizon|iceberg|kanagawa|kiribyte|material|molokai|monokai|moonlight|night-owl|nord|oceanic-next|onedark|pastel|poimandres|rose-pine|slack|snazzy|solarized|spacegray|synthwave|tokyo-night|vesper
# @powerkit_theme_variant                    default: mocha                            # depends on theme; solarized → dark|light
# @powerkit_custom_theme_path                default: (unset)                          # path to custom theme file (overrides theme/variant)
# @powerkit_transparent                      default: false                            # true|false (use terminal bg for status bar)
#
# ──── Status Bar ────
# @powerkit_status_interval                  default: 5                                # refresh seconds; lower = more CPU
# @powerkit_status_position                  default: top                              # top|bottom
# @powerkit_status_justify                   default: left                             # left|centre|right (window list alignment)
# @powerkit_bar_layout                       default: single                           # single|double (2 status lines)
# @powerkit_status_order                     default: session,plugins                  # 2-element auto-expands; 3-element (session,windows,plugins) enables centered layout
#
# ──── Plugins ────
# @powerkit_plugins                          default: datetime,battery,cpu,memory,hostname,git  # comma list; group(a,b,c) for shared bg
# @powerkit_plugin_group_colors              default: info-base-darker,window-active-base-darker,ok-base-darker,warning-base-darker,error-base-darker,disabled-base  # palette assigned in order
# @powerkit_plugin_group_coloring            default: false                            # true = group palette overrides plugin segment bg (health → bold instead)
#
# ──── Lazy Loading (stale-while-revalidate) ────
# @powerkit_lazy_loading                     default: true                             # stale cache returned while bg refresh runs
# @powerkit_stale_multiplier                 default: 3                                # max staleness = TTL × multiplier; beyond = blocking refresh
# @powerkit_stale_color_variant              default: -darkest                         # -darker|-darkest|-lighter|-lightest (applied to stale bgs)
#
# ──── Separators ────
# @powerkit_separator_style                  default: normal                           # normal|rounded|slant|slantup|trapezoid|flame|pixel|honeycomb|none
# @powerkit_edge_separator_style             default: rounded                          # any style + optional :all suffix (e.g. rounded:all, flame:all)
# @powerkit_elements_spacing                 default: false                            # false|true|both|windows|plugins (gaps between segments)
# @powerkit_icon_padding                     default: 1                                # 1-3 spaces around plugin icons
#
# ──── Session ────
# @powerkit_session_icon                     default: auto                             # auto (OS-detect) or any Nerd Font char
# @powerkit_session_prefix_icon              default:  (nf-fa-keyboard, U+F11C)        # icon when prefix pressed
# @powerkit_session_copy_icon                default:  (nf-fa-copy, U+F0C5)            # icon in copy mode
# @powerkit_session_normal_color             default: session-bg                       # theme color name
# @powerkit_session_prefix_color             default: session-prefix-bg                # theme color name
# @powerkit_session_copy_mode_color          default: session-copy-bg                  # theme color name
# @powerkit_session_show_mode                default: false                            # display copy/prefix/search/command mode label
# @powerkit_session_command_icon             default: (unset)                          # icon in command mode (accepted by powerkit, no shipped default)
# @powerkit_session_search_icon              default: (unset)                          # icon in search mode (accepted by powerkit, no shipped default)
#
# ──── Window ────
# @powerkit_active_window_icon               default:  (nf-dev-terminal, U+E795)       # icon for active window
# @powerkit_inactive_window_icon             default:  (nf-oct-terminal, U+F489)       # icon for inactive windows
# @powerkit_zoomed_window_icon               default:  (nf-mdi-fullscreen, U+F531)     # icon for zoomed pane
# @powerkit_window_activity_icon             default:  (nf-md-bell_ring, U+F006E)      # shown with monitor-activity on
# @powerkit_window_bell_icon                 default:  (nf-md-bell_alert, U+F009A)     # shown for bell alert
# @powerkit_window_marked_icon               default:  (nf-md-bookmark, U+F0306)       # shown for marked windows (M flag)
# @powerkit_pane_synchronized_icon           default: ✵ (U+2735)                       # shown when synchronize-panes is on
# @powerkit_active_window_title              default: #W                               # tmux format string (#W|#I|#F|#{b:pane_current_path})
# @powerkit_inactive_window_title            default: #W                               # tmux format string
# @powerkit_window_index_style               default: text                             # text|numeric|box|box_outline|box_multiple|box_multiple_outline|circle|circle_outline
#
# ──── Pane Borders ────
# @powerkit_pane_border_status               default: off                              # off|top|bottom
# @powerkit_pane_border_status_bg            default: none                             # theme color name, hex (#RRGGBB), or "none"
# @powerkit_pane_border_format               default: "{active} {command}"             # tokens: {index} {title} {command} {path} {basename} {active}; raw #{...} tmux formats pass through
# @powerkit_pane_border_lines                default: single                           # single|double|heavy|simple|number
# @powerkit_pane_border_unified              default: false                            # true = single color for all borders
# @powerkit_pane_border_color                default: pane-border-active               # used when unified=true
# @powerkit_active_pane_border_color         default: pane-border-active               # used when unified=false
# @powerkit_inactive_pane_border_color       default: pane-border-inactive             # used when unified=false
#
# ──── Pane Scrollbars (tmux 3.4+) ────
# @powerkit_pane_scrollbars                  default: off                              # off|modal|on (modal = visible only in copy/view mode)
# @powerkit_pane_scrollbars_position         default: right                            # left|right
# @powerkit_pane_scrollbars_style_fg         default: pane-border-active               # slider color (theme name or hex)
# @powerkit_pane_scrollbars_style_bg         default: pane-border-inactive             # track color (theme name or hex)
# @powerkit_pane_scrollbars_width            default: 1                                # integer 1-5 recommended
# @powerkit_pane_scrollbars_pad              default: 0                                # integer 0-2 recommended
#
# ──── Pane Flash Effect ────
# @powerkit_pane_flash_enabled               default: false                            # true|false (briefly flash bg on pane select)
# @powerkit_pane_flash_color                 default: statusbar-bg                     # theme name, hex, or tmux format (e.g. #{?#{@dark_appearance},#073642,#eee8d5})
# @powerkit_pane_flash_duration              default: 100                              # milliseconds (50-200 recommended)
#
# ──── Popup & Menu ────
# @powerkit_popup_border_lines               default: rounded                          # single|rounded|double|heavy|simple|padded|none
# @powerkit_menu_border_lines                default: rounded                          # single|rounded|double|heavy|simple|padded|none
#
# ──── Clock ────
# @powerkit_clock_style                      default: 24                               # 12|24 (tmux clock-mode format)
#
# ──── Keybindings (all under tmux prefix) ────
# @powerkit_show_options_key                 default: C-e                              # options viewer popup; "" disables
# @powerkit_show_options_width               default: 80%                              # popup width (% or columns)
# @powerkit_show_options_height              default: 80%                              # popup height (% or rows)
# @powerkit_show_keybindings_key             default: C-y                              # keybindings viewer popup; "" disables
# @powerkit_show_keybindings_width           default: 80%
# @powerkit_show_keybindings_height          default: 80%
# @powerkit_theme_selector_key               default: C-r                              # theme selector popup
# @powerkit_cache_clear_key                  default: M-x                              # clear all cached data
# @powerkit_log_viewer_key                   default: M-l                              # log viewer popup
# @powerkit_log_viewer_width                 default: 90%
# @powerkit_log_viewer_height                default: 80%
# @powerkit_reload_config_key                default: R                                # reload tmux config (Shift+r avoids choose-buffer conflict)
# @powerkit_keybinding_conflict_action       default: warn                             # warn|skip|ignore
#
# ──── Plugin-Specific Options (pattern: @powerkit_plugin_<name>_<option>) ────
# Powerkit ships 46 plugins. Each declares its own options via plugin_declare_options().
# Common patterns:
#   @powerkit_plugin_<name>_icon              # custom icon for that plugin
#   @powerkit_plugin_<name>_cache_ttl         # cache duration (seconds)
#   @powerkit_plugin_<name>_warning_threshold # numeric threshold for warning health
#   @powerkit_plugin_<name>_critical_threshold # numeric threshold for error health
#   @powerkit_plugin_<name>_show_only_on_threshold  # default: false (auto-injected to ALL plugins)
#   @powerkit_plugin_<name>_template          # override segment template
#   @powerkit_plugin_<name>_format            # plugin-specific format string
# Plugin list: appearance, audiodevices, battery, bitbucket, bitwarden, bluetooth, brightness,
#   camera, chezmoi, cloud, cloudstatus, cpu, crypto, datetime, disk, external_ip, fan, git,
#   github, gitlab, gpu, hostname, iops, jira, kubernetes, loadavg, memory, microphone,
#   netspeed, nowplaying, packages, ping, pomodoro, smartkey, ssh, stocks, swap, temperature,
#   terraform, timezones, uptime, volume, vpn, weather, wifi, yadm
# To discover one plugin's options: grep declare_option ~/.config/tmux/plugins/tmux-powerkit/src/plugins/<name>.sh
#
# ──── Segment Template (advanced) ────
# @powerkit_segment_template                 default: {sep_left}{icon_section}{sep_internal}{content_section}{sep_right}
# @powerkit_plugin_<name>_template           default: (inherits global)                # per-plugin override
# Template vars: {sep_left} {sep_right} {sep_internal} {icon} {icon_bg} {icon_fg} {content}
#                {content_bg} {content_fg} {prev_bg} {next_bg} {icon_section} {content_section}
# }}}

## Status bar
set -g @powerkit_status_position 'top'
# 3-element orders enable CENTERED layout:
set -g @powerkit_status_order "session,windows,plugins"  # session LEFT, windows CENTER, plugins RIGHT
set -g @powerkit_plugins "group(nowplaying,packages,temperature,cpu,memory),group(git),group(appearance,ssh,vpn,hostname)"
# set -g @powerkit_plugin_datetime_format "preset_1"  # %Y-%m-%d %H:%M:%S
# set -g @powerkit_plugin_datetime_format "%Y-%m-%d %A"
set -g @powerkit_separator_style "normal"  # or normal, flame, pixel, honeycomb, slant, slantup, trapezoid
set -g @powerkit_edge_separator_style "rounded" # "rounded"  # or normal, flame, pixel, honeycomb
set -g @powerkit_elements_spacing "windows"  # false, true, both, windows, plugins
set -g @powerkit_status_interval "5"

## Keybinding helpers
set -g @powerkit_show_options_key "C-e"
set -g @powerkit_show_options_width "80%"
set -g @powerkit_show_options_height "80%"
# set -g @powerkit_show_keybindings_key "C-y"
set -g @powerkit_show_keybindings_key "?"
set -g @powerkit_show_keybindings_width "80%"
set -g @powerkit_show_keybindings_height "80%"
set -g @powerkit_theme_selector_key "C-t"
set -g @powerkit_cache_clear_key "M-x"
set -g @powerkit_log_viewer_key "M-l"
set -g @powerkit_log_viewer_width "90%"
set -g @powerkit_log_viewer_height "80%"
set -g @powerkit_reload_config_key "R"  # Reload

## Theme
set -g @powerkit_transparent "false"
# set -g @powerkit_theme "cobalt2"
# set -g @powerkit_theme_variant "default"
set -g @powerkit_theme "solarized"
# set -g @powerkit_theme_variant "dark"   # Should be set automatically now with zac
set -g @powerkit_plugin_appearance_mouse_toggle "true"
set -g @powerkit_plugin_group_colors "info-base-darker,window-active-base-darker,ok-base-darker,warning-base-darker,error-base-darker,disabled-base"

## Session
set -g @powerkit_session_icon "auto"
set -g @powerkit_session_prefix_icon "🗂️"
set -g @powerkit_session_copy_icon "🖨️"
set -g @powerkit_session_command_icon ""
set -g @powerkit_session_search_icon "🔎"
set -g @powerkit_session_normal_color "session-bg"
set -g @powerkit_session_prefix_color "session-prefix-bg"
set -g @powerkit_session_copy_mode_color "session-copy-bg"

## Window
set -g @powerkit_active_window_icon "🖥️"
# set -g @powerkit_inactive_window_icon ""
set -g @powerkit_zoomed_window_icon "🔍"
set -g @powerkit_pane_synchronized_icon "👯"
# set -g @powerkit_window_default_icon ""
set -g @powerkit_window_index_style "numeric"
set -g @powerkit_active_window_title "#W"
set -g @powerkit_inactive_window_title "#W"

## Pane flash
set -g @powerkit_pane_flash_enabled "true"
set -g @powerkit_pane_flash_color "statusbar-bg"
# set -g @powerkit_pane_flash_color "session-copy-bg"
set -g @powerkit_pane_flash_duration "99"

## Pane borders
set -g @powerkit_pane_border_status "top" # Show pane status: off, top, bottom
set -g @powerkit_pane_border_status_bg "statusbar-bg"  # flips with theme variant (base02 dark / base2 light); contrasts with hardcoded #268bd2 active fg in both
set -g @powerkit_pane_border_format "{active} #{?@alias,[#{@alias}] ,}#{pane_id} {basename}"
set -g @powerkit_pane_border_lines "heavy"  # Border style: single, double, heavy, simple, number

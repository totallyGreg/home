# {{{ Custom popups & palettes
# Unified picker — sesh sessions, tmux windows, curated tmux commands.
# - M-`     open the `tmux-actions` tv channel via `t -p`
# - Ctrl-S  cycle sources: sesh-all → tmux → windows → config → zoxide → commands
# - Enter   dispatch by entry type (sesh connect / select-window / tmux subcommand)
# Dispatch logic lives in ~/.config/zsh/functions/t (autoloaded zsh function).
bind-key -n "M-`" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'tmux actions' zsh -ic 't -p'

# prefix + / : command palette for tmux keybindings (companion to powerkit's '?')
# '?' shows the full reference list; '/' is fuzzy + Enter executes the binding.
bind-key / display-popup -E -w 85% -h 80% -d '#{pane_current_path}' \
  -T 'tmux command palette' \
  zsh -ic 'keybindings tmux'

# Command Prompt
bind-key : display-popup -E -w 70% -h 20% "tmux command-prompt"

# }}}

# {{{ Window
## Screen-like switching
# bind-key C-a last-window

## Prompts and refresh
bind-key : command-prompt
bind-key r refresh-client
# window rename on focus
# set-hook -g pane-focus-in 'rename-window "#T"'

## Movement
bind-key -r > swap-window -d -t :+
bind-key -r < swap-window -d -t :-
bind-key C-o rotate-window

## Selection
# bind-key space next-window
bind-key bspace previous-window

## Splits
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

## Layout
# # bind-key = select-layout main-horizontal
bind-key = select-layout main-vertical
bind-key 9 split-window -v "k9s"   # intentionally shadows tmux's built-in `prefix + 9` (select-window 9)
# bind-key o split-window -v -c ~/Notes "reattach-to-user-namespace nvim +ObsidianDailies"
# }}}

# {{{ Pane
## Pane colours (commented experiments)
# set -g window-style 'fg=default,bg=black'
# set -g window-active-style 'fg=default,bg=brightblack'
set-option -g @pane_resize "5"
# set -g pane-border-format ' #T '
set -g pane-border-status top
# These two get overwritten by Tmuxline lightline
# set -g pane-active-border-style fg=default,bg=default
# set -g pane-border-style fg=default

## Target utilities
# prefix + T: copy pane target (session:window.pane) to clipboard
# (prefix + Y is owned by tmux-yank → copies pane's current working directory)
bind-key T run-shell "tmux display-message -p '#{session_name}:#{window_index}.#{pane_index}' | pbcopy && tmux display-message 'Target copied!'"

# prefix + M-s: save pane history (moved from S — tmux-sessionist claims prefix+S for switch-client -l;
# avoided C-s too because it conflicts with Claude Code stash prompt)
bind-key M-s run-shell "~/.local/bin/claude-dashboard-save-history"

# prefix + # → unique pane_id (%N), stable across renames
# bind-key '#' run-shell '\
#   id="#{pane_id}"; \
#   printf "%s" "$id" | pbcopy; \
#   tmux display-message "Copied: $id"'

## Pane Control
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

## Vim-aware resize (root table M-h/j/k/l)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -r -T root M-h run "($is_vim && tmux send-keys M-h) || \
  tmux resize-pane -L 5"
bind -r -T root M-j run "($is_vim && tmux send-keys M-j) || \
  tmux resize-pane -D 5"
bind -r -T root M-k run "($is_vim && tmux send-keys M-k) || \
  tmux resize-pane -U 5"
bind -r -T root M-l run "($is_vim && tmux send-keys M-l) || \
  tmux resize-pane -R 5"

## Pane Synchronisation Mode
bind-key * setw synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"
# (powerkit handles the synchronized-pane indicator via @powerkit_pane_synchronized_icon)
# }}}

# {{{ Copy-mode
bind-key [ copy-mode
bind-key ] paste-buffer

## Useful VIM copy keybindings (gated on tmux ≥ 2.4)
run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | tr -d '[:alpha:]')"
if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.4" | bc)" = 1 ]' \
  "bind-key -T copy-mode-vi v   send -X begin-selection; \
   bind-key -T copy-mode-vi V   send -X select-line; \
   bind-key -T copy-mode-vi C-v send -X rectangle-toggle; \
   bind-key -T copy-mode-vi y   send -X copy-pipe-and-cancel"
# }}}

# }}}

# {{{ HOOKS & CONDITIONALS
# _  _ ____ ____ _  _ ____
# |__| |  | |  | |_/  [__
# |  | |__| |__| | \_ ___]

## SSH: source remote-specific overrides when nested
# Graciously stolen from https://github.com/samoshkin/tmux-config/blob/master/tmux/tmux.conf
if-shell 'test -n "$SSH_CLIENT"' \
    'source-file $XDG_CONFIG_HOME/tmux/tmux.remote.conf'

## F12 nested-session pass-through
# Single prefix key "C-a" should be usable both locally and remotely
# (we don't want the "C-a, C-a" approach). Idea: turn off all key bindings
# and prefix handling on the local session so keystrokes pass through to the
# nested/remote session.
# see: toggle on/off all keybindings · Issue #237 · tmux/tmux - https://github.com/tmux/tmux/issues/237
#
# F12: toggle local key-table off so all keys pass through to nested tmux/SSH
# (companion to tmux.remote.conf — useful when SSH'd to a host running tmux)
# Uses status-bg as a single "off mode" indicator (may be overwritten by powerkit refresh).
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-bg colour238 \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-bg \;\
    refresh-client -S
# }}}


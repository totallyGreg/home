## Vars renewed for each new shell (rest handled by zsh precmd hook)
set -g update-environment \
  "DISPLAY\
  AWS_SSO_PROFILE\
  ExpressVPN\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"

## ExpressVPN status (runs at parse time)
set-environment -g ExpressVPN `$HOME/bin/ExpressVPN.sh`

# {{{ Core (sensible, sessionist, logging)
# Workaround for sensible bug in 3.5a https://github.com/tmux/tmux/issues/4162 doesn't seem to work
# Removing reattach-to-user-namespace resolved this issue.
set -g @plugin 'tmux-plugins/tmux-sensible'   # safe to load after powerkit: sensible guards every set with "only if unchanged"
set -g @plugin 'tmux-plugins/tmux-sessionist'  # https://github.com/tmux-plugins/tmux-sessionist

set -g @plugin 'tmux-plugins/tmux-logging'
  # - [x] turn logging on/off:  prefix + shift + p
  # - [x] screen capture:        prefix + alt + p
  # - [x] dump pane history:     prefix + alt + shift + p (conflicts with amethyst)
  # - [ ] status indicator while logging
  # - [ ] rename log session to reflect activity
  set -g @logging-path "$HOME/Library/Logs/Terminal-Logs"
  set -g @screen-capture-path "#{pane_current_path}"
  set -g @save-complete-history-path "#{pane_current_path}"
  set -g @save-complete-history-key "F7"  # Extended Function keys (F13) do not work
  set -g @save_complete_history_filename "tmux-%Y%m%dT%H%M%S-#{session_name}-#{window_name}.log" # not picked up
# }}}

# {{{ Agentic Harnessing
set -g @plugin 'accessd/tmux-agent-indicator'
# Enable/disable visual channels
set -g @agent-indicator-border-enabled 'on'
set -g @agent-indicator-indicator-enabled 'on'

# Per-agent icons
set -g @agent-indicator-icons 'claude=🤖,codex=🧠,opencode=💻,default=🤖'

# Keep pane colors until you focus the pane (instead of clearing immediately)
set -g @agent-indicator-reset-on-focus 'on'

# Knight Rider animation while running
set -g @agent-indicator-animation-enabled 'on':worth:xterm-ghostty:xterm-ghostty
# }}}

# {{{ Searching (fuzzback, fzf-links)
set -g @plugin 'roosta/tmux-fuzzback' # <prefix>-? to search back in buffer
  set -g @fuzzback-bind F   # moved from / (collided with prefix+/ palette); F = "Find back"
  set -g @fuzzback-popup 1
  set -g @fuzzback-popup-size '90%'
  # set -g @fuzzback-fzf-bind 'ctrl-y:execute-silent(echo -n {3..} | pbcopy )+abort'

set -g @plugin 'alberti42/tmux-fzf-links'
  set-option -g @fzf-links-key C-g
# }}}

# {{{ Navigation (tmux-navigate)
# The best tmux/vim navigation now in plugin form
set -g @plugin 'sunaku/tmux-navigate'
  set -g @navigate-left  '-n C-h'
  set -g @navigate-down  '-n C-j'
  set -g @navigate-up    '-n C-k'
  set -g @navigate-right '-n C-l'
  set -g @navigate-back  '-n C-\'
# }}}

# {{{ Persistent sessions (resurrect, continuum)
set -g @plugin 'tmux-plugins/tmux-resurrect'
  # Defaults — keep these COMMENTED. Uncommenting `@resurrect-restore 'R'`
  # would silently steal `R` from powerkit's reload-config binding.
  # set -g @resurrect-save 'S'
  # set -g @resurrect-restore 'R'

set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @continuum-save-interval '5'
  # If things get weird you can disable this
  set -g @continuum-restore 'off'
  # or simply `touch ~/tmux_no_auto_restore`
# }}}

# {{{ Fuzzy launcher (tmux-fzf)
set -g @plugin 'sainnhe/tmux-fzf'     # prefix-F to launch
# TMUX_FZF_ORDER="session|window|pane|command|clipboard|keybinding"
TMUX_FZF_ORDER="session|window|pane|command|keybinding"
TMUX_FZF_PANE_FORMAT="[#{window_name}] #{pane_current_command}  [#{pane_width}x#{pane_height}] [history #{history_size}/#{history_limit}, #{history_bytes} bytes] #{?pane_active,[active],[inactive]}"
TMUX_FZF_LAUNCH_KEY="C-f"
# }}}

# {{{ Open (tmux-open)
# Plugin for opening highlighted selection directly from Tmux copy mode.
# o - "open" a highlighted selection with the system default program. open for OS X or xdg-open for Linux.
# Ctrl-o - open a highlighted selection with the $EDITOR
# Shift-s - search the highlighted selection directly inside a search engine (defaults to google).
set -g @plugin 'tmux-plugins/tmux-open'
# }}}


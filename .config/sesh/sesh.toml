#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
dir_length = 2  # Uses last 2 directories: "projects/sesh" instead of just "sesh"
sort_order = [
    "tmux",   # show first
    "config",
    "zoxide", # show last
]

[default_session]
# Used for any session/zoxide entry that doesn't define its own preview_command.
# Running tmux sessions get a live pane capture from sesh automatically.
# NOTE: sesh runs preview_command via exec (no shell), so no pipes/&&/||/redirects.
preview_command = "lsd --tree --depth 2 --color=always --icon=always {}"

[[session]]
name = "⚙️ tmux"
path = "~/.config/tmux"
startup_command = "nvim -O tmux.conf ~/.config/sesh/sesh.toml"
preview_command = "bat --color=always ~/.config/tmux/tmux.conf"

[[session]]
name = "Downloads 📥"
path = "~/Downloads"
startup_command = "ls"

[[session]]
name = "Claude🦀 Local"
path = "~/Projects"
windows = ["claude-local"]

[[window]]
name = "claude-local"
startup_script = "ollama launch claude --model $(ollama list | fzf --popup --header-lines=1 --accept-nth=1)"

[[window]]
name = "claude-qwen3.5"
startup_script = "ollama launch claude --model qwen3.5:35b-a3b-coding-nvfp4"

[[window]]
name = "claude-gemma4"
startup_script = "ollama launch claude --model gemma4:31B"

[[window]]
name = "claude-lmstudio"
startup_script = 'export ANTHROPIC_BASE_URL="http://localhost:1234"  export ANTHROPIC_AUTH_TOKEN="lmstudio"  claude /model microsoft/phi-4-mini-reasoning'


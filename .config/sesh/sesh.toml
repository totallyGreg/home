#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
dir_length = 2  # Uses last 2 directories: "projects/sesh" instead of just "sesh"
sort_order = [
    "tmux",   # show first
    "config",
    "zoxide", # show last
]

[default_session]
# Used for any session/zoxide entry that doesn't define its own preview_command.
# Running tmux sessions get a live pane capture from sesh automatically.
# NOTE: sesh runs preview_command via exec (no shell), so no pipes/&&/||/redirects.
preview_command = "lsd --tree --depth 2 --color=always --icon=always {}"

[[wildcard]]
pattern = "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/*"
startup_command = "omlx launch claude"

[[session]]
name = "⚙️ tmux"
path = "~/.config/tmux"
startup_command = "nvim -O tmux.conf ~/.config/sesh/sesh.toml"
preview_command = "bat --color=always ~/.config/tmux/tmux.conf"
# windows = [ "Claude🦀 Local", "Downloads 📥" ]

[[session]]
name = "Downloads 📥"
path = "~/Downloads"
startup_command = "ls"

[[session]]
name = "Claude🦀 Local"
path = "~/Projects"
startup_command = "ollama launch claude --model $(ollama list | fzf --popup=130,28 --layout=reverse --header-lines=1 --header-first --accept-nth=1 --preview 'ollama show {1}' --preview-window=right:44)"

[[session]]
name = "oMLX Claude🦀"
path = "~/Projects"
startup_command = "omlx launch claude"
windows = [ "Agent 1", "oMLX Claude", "Documentation" ]

[[window]]
name = "Agent 1"

[[window]]
name = "Agent 2"

[[window]]
name = "Documentation"
startup_script = "omlx launch claude --model Phi-4-mini-reasoning-MLX-4bit"

[[window]]
name = "oMLX Claude"
startup_script = "omlx launch claude"

[[window]]
name = "ollama claude"
startup_script = "ollama launch claude --model $(ollama list | fzf --popup=130,28 --layout=reverse --header-lines=1 --header-first --accept-nth=1 --preview 'ollama show {1}' --preview-window=right:44)"

[[window]]
name = "claude-television"
startup_script = "ollama launch claude --model $(ollama list | fzf --popup=130,28 --layout=reverse --header-lines=1 --header-first --accept-nth=1 --preview 'ollama show {1}' --preview-window=right:44)"

[[window]]
name = "claude-qwen3.5"
startup_script = "ollama launch claude --model qwen3.5:35b-a3b-coding-nvfp4"

[[window]]
name = "claude-gemma4"
startup_script = "ollama launch claude --model gemma4:31B"

[[window]]
name = "claude-lmstudio"
startup_script = 'export ANTHROPIC_BASE_URL="http://localhost:1234"  export ANTHROPIC_AUTH_TOKEN="lmstudio"  claude /model microsoft/phi-4-mini-reasoning'


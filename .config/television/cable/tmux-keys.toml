[metadata]
name = "tmux-keys"
description = "Browse tmux keybindings grouped by table (unwired parallel implementation; see ~/.config/zsh/functions/keybindings for the canonical UI)"
requirements = ["tmux"]

[source]
command = """
tmux list-keys | awk '{
  table=""; key=""; start=0
  for (i=1; i<=NF; i++) if ($i == "-T") { table=$(i+1); key=$(i+2); start=i+3; break }
  if (table == "" || start == 0) next
  cmd=""; for (j=start; j<=NF; j++) cmd = cmd (cmd?" ":"") $j
  printf "%-13s\\t%-25s\\t%s\\n", table, key, cmd
}' | column -t -s "$(printf '\\t')"
"""
output = "{}"

[preview]
command = """
echo '{}' | awk '{
  printf "\\033[1;36mTable:\\033[0m   %s\\n", $1
  printf "\\033[1;36mKey:\\033[0m     %s\\n\\n", $2
  printf "\\033[1;36mCommand:\\033[0m\\n"
  $1=""; $2=""; sub(/^[ \\t]+/, "")
  print
}'
"""

[ui.preview_panel]
size = 50

[keybindings]
ctrl-y = "actions:copy-key"
ctrl-x = "actions:copy-command"
ctrl-e = "actions:execute"

[actions.copy-key]
description = "Copy the key sequence to clipboard"
command = "echo '{}' | awk '{print $2}' | tr -d '\\n' | pbcopy"
mode = "execute"

[actions.copy-command]
description = "Copy the tmux command to clipboard"
command = "echo '{}' | awk '{$1=\"\"; $2=\"\"; sub(/^[ \\t]+/, \"\"); print}' | tr -d '\\n' | pbcopy"
mode = "execute"

[actions.execute]
description = "Run the tmux command now"
command = "echo '{}' | awk '{$1=\"\"; $2=\"\"; sub(/^[ \\t]+/, \"\"); print}' | xargs tmux"
mode = "execute"
